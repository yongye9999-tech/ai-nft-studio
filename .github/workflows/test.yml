# AI+NFT Studio — GitHub Actions CI/CD
# Triggers on push/PR to main. Runs contract tests and frontend build check.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Smart Contract Tests ─────────────────────────────────────
  contracts:
    name: Contracts (Compile + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run tests
        run: npx hardhat test

  # ── Frontend Build Check ─────────────────────────────────────
  frontend:
    name: Frontend (Type-check + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      # Provide dummy env vars so Next.js build doesn't fail on missing vars
      NEXT_PUBLIC_AINFT_CONTRACT_ADDRESS: "0x0000000000000000000000000000000000000000"
      NEXT_PUBLIC_MARKETPLACE_CONTRACT_ADDRESS: "0x0000000000000000000000000000000000000000"
      NEXT_PUBLIC_CHAIN_ID: "11155111"
      HUGGINGFACE_API_KEY: "dummy"
      PINATA_JWT: "dummy"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build (type-check + compilation)
        run: npm run build
